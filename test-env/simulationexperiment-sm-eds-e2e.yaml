apiVersion: experiment.cbse.terministic.de/alpha3
kind: SimulationExperiment
metadata:
  name: sm-eds-e2e
  namespace: default
spec:
  defaultServiceType: ClusterIP
  detailDatabase:
    image: busybox:latest
    command: ["tail"]
    args: ["-f", "/dev/null"]
    dbname: simulation_db
    user: postgres
    password: postgres
    port: 5432
    serviceType: ClusterIP
  resultDatabase:
    image: busybox:latest
    command: ["tail"]
    args: ["-f", "/dev/null"]
    dbname: result_db
    user: postgres
    password: postgres
    port: 5432
    serviceType: ClusterIP
  translator:
    image: busybox:latest
    command: ["tail"]
    args: ["-f", "/dev/null"]
    repository: translator-repo
    baseimage: translator-baseimage
    serviceType: ClusterIP
    port: 8080
  postProcessingService:
    image: busybox:latest
    command: ["tail"]
    args: ["-f", "/dev/null"]
    serviceType: ClusterIP
    port: 8081
  experimentalDesignService:
    design: "SM EDS integration test"
    image: docker.io/d4ns3u/cbse-testing:eds-mock.test.26.7.16
    serviceType: ClusterIP
    port: 8082
