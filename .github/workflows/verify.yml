name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: |
            experiment-operator/go.sum
            scenario-manager/go.sum
            test/e2e/go.sum
      - name: Run hermetic verification
        run: make test-fast
